[project]
name = "bentoml-faster-whisper"
version = "1.4.1"
requires-python = ">=3.13,<3.14"
dependencies = [
    "bentoml==1.4.38",
    "fastapi>=0.135.0",
    "faster-whisper==1.2.1",
    "torch>=2.8.0",
    "torchaudio>=2.8.0",
    "pydantic>=2.12.2",
    "requests~=2.33.1",
    "ctranslate2~=4.7.1",
    "python-dotenv~=1.2.0",
    "uvicorn~=0.44.0",
    "pydub>=0.25.1",
    "audioop-lts>=0.2.1",
    "pyannote-audio>=4.0",
    "huggingface-hub>=0.23",
    "loguru>=0.7.3",
    "numpy>=2.2.0",
]
[dependency-groups]
dev = [
    "ty>=0.0.1",
    "pre-commit>=4.2.0",
    "pytest~=9.0.0",
    "pytest-asyncio>=0.24.0",
    "openai>=1.65.1",
]

[tool.bentoml.build]
service = "service:FasterWhisper"
description = "OpenAI compatible ++ FasterWhisper API"
include = ["*.py", "path/to/a/file.csv"]
exclude = ["tests/", "launch.py"]

[tool.bentoml.build.labels]
owner = "Yanick-Schraner"
stage = "production"

[tool.uv.sources]
torch = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchaudio = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.ruff]
target-version = "py313"
line-length = 120
fix = true
